<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waypoint — a lesson a day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#10192E;
    --ink:#F4F2ED;
    --paper:#EDE6D3;
    --amber:#F5A623;
    --stamp:#D64545;
    --teal:#2A9D8F;
    --dim: rgba(244,242,237,0.55);
    --line-on-navy: rgba(244,242,237,0.18);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--navy);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    padding:28px 16px 60px;
    display:flex;
    justify-content:center;
  }
  .app{ width:100%; max-width:640px; }

  header{ margin-bottom:28px; }
  header h1{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size:44px;
    letter-spacing:1px;
    line-height:0.95;
  }
  header p{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--dim);
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-top:6px;
  }

  /* ---------- Home / board view ---------- */
  .board{ border-top:2px solid var(--line-on-navy); }
  .board-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding:18px 4px;
    border-bottom:2px solid var(--line-on-navy);
    cursor:pointer;
  }
  .board-row:hover{ background:rgba(244,242,237,0.04); }
  .row-left{ display:flex; flex-direction:column; gap:4px; min-width:0; }
  .row-topic{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .row-meta{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--dim);
  }
  .row-status{
    font-family:'Space Mono', monospace;
    font-size:11px;
    font-weight:700;
    letter-spacing:1px;
    padding:6px 10px;
    white-space:nowrap;
    border:1.5px solid currentColor;
  }
  .status-boarding{ color:var(--amber); }
  .status-transit{ color:var(--teal); }
  .status-arrived{ color:var(--stamp); }

  .add-route{
    margin-top:20px;
    display:flex;
    gap:8px;
  }
  .add-route input{
    flex:1;
    background:transparent;
    border:2px solid var(--line-on-navy);
    color:var(--ink);
    padding:12px 14px;
    font-family:'Work Sans', sans-serif;
    font-size:14px;
  }
  .add-route input::placeholder{ color:var(--dim); }
  .add-route input:focus{ outline:none; border-color:var(--amber); }
  .add-route button{
    background:var(--amber);
    color:var(--navy);
    border:none;
    padding:12px 18px;
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
    cursor:pointer;
  }

  .empty-board{
    padding:32px 4px;
    color:var(--dim);
    font-size:14px;
    line-height:1.6;
  }

  /* ---------- Boarding pass / lesson view ---------- */
  .back-link{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--dim);
    letter-spacing:1px;
    text-transform:uppercase;
    background:none;
    border:none;
    cursor:pointer;
    margin-bottom:16px;
    padding:0;
  }
  .back-link:hover{ color:var(--ink); }

  .pass{
    background:var(--paper);
    color:var(--navy);
    position:relative;
    box-shadow:0 8px 0 rgba(0,0,0,0.25);
  }
  .pass-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:22px 24px 18px;
  }
  .pass-day{
    font-family:'Space Mono', monospace;
    font-size:12px;
    letter-spacing:1px;
    color:rgba(16,25,46,0.55);
  }
  .pass-day b{
    display:block;
    font-family:'Big Shoulders Display', sans-serif;
    font-size:40px;
    font-weight:800;
    color:var(--navy);
    line-height:1;
    margin-top:2px;
  }
  .pass-streak{
    font-family:'Space Mono', monospace;
    font-size:12px;
    text-align:right;
    color:rgba(16,25,46,0.55);
  }
  .pass-streak b{
    display:block;
    font-size:20px;
    color:var(--stamp);
  }
  .pass-destination{
    padding:0 24px 20px;
    font-family:'Big Shoulders Display', sans-serif;
    font-size:26px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }

  .perforation{
    position:relative;
    border-top:2px dashed rgba(16,25,46,0.3);
    margin:0 0;
  }
  .perforation::before, .perforation::after{
    content:"";
    position:absolute;
    top:-11px;
    width:22px;
    height:22px;
    background:var(--navy);
    border-radius:50%;
  }
  .perforation::before{ left:-11px; }
  .perforation::after{ right:-11px; }

  .lesson-section{ padding:22px 24px 26px; }
  .lesson-title{
    font-family:'Big Shoulders Display', sans-serif;
    font-size:22px;
    font-weight:700;
    margin-bottom:10px;
  }
  .lesson-body{ font-size:15px; line-height:1.65; }

  .quiz-section{ padding:24px 24px 28px; }
  .quiz-label{
    font-family:'Space Mono', monospace;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:rgba(16,25,46,0.55);
    margin-bottom:14px;
  }
  .quiz-q{ margin-bottom:22px; }
  .quiz-q:last-child{ margin-bottom:0; }
  .quiz-q-text{ font-size:15px; font-weight:500; margin-bottom:10px; }
  .quiz-options{ display:flex; flex-direction:column; gap:8px; }
  .quiz-option{
    text-align:left;
    background:rgba(16,25,46,0.04);
    border:2px solid rgba(16,25,46,0.18);
    color:var(--navy);
    padding:10px 14px;
    font-family:'Work Sans', sans-serif;
    font-size:14px;
    cursor:pointer;
  }
  .quiz-option:hover:not(:disabled){ border-color:var(--navy); }
  .quiz-option:disabled{ cursor:default; }
  .quiz-option.correct{ background:rgba(42,157,143,0.18); border-color:var(--teal); }
  .quiz-option.incorrect{ background:rgba(214,69,69,0.18); border-color:var(--stamp); }
  .quiz-explain{
    font-size:12.5px;
    color:rgba(16,25,46,0.65);
    margin-top:8px;
    font-style:italic;
  }

  .stamp-overlay{
    position:absolute;
    top:36px;
    right:28px;
    border:4px solid var(--stamp);
    color:var(--stamp);
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size:15px;
    letter-spacing:2px;
    padding:8px 14px;
    transform:rotate(10deg);
    text-transform:uppercase;
    background:rgba(237,230,211,0.85);
    pointer-events:none;
  }

  .result-bar{
    padding:20px 24px 28px;
    text-align:center;
  }
  .result-score{
    font-family:'Big Shoulders Display', sans-serif;
    font-size:32px;
    font-weight:800;
  }
  .result-note{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:rgba(16,25,46,0.6);
    margin-top:6px;
    text-transform:uppercase;
    letter-spacing:1px;
  }

  .cta-row{ margin-top:20px; }
  .generate-btn{
    width:100%;
    background:var(--amber);
    color:var(--navy);
    border:none;
    padding:16px;
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1px;
    cursor:pointer;
  }
  .generate-btn:disabled{ opacity:0.6; cursor:wait; }

  .error-banner{
    background:var(--stamp);
    color:var(--ink);
    font-family:'Space Mono', monospace;
    font-size:12px;
    padding:12px 16px;
    margin-bottom:16px;
    display:none;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
  }
  .error-banner button{
    background:var(--ink);
    color:var(--stamp);
    border:none;
    font-family:'Space Mono', monospace;
    font-size:11px;
    font-weight:700;
    padding:5px 10px;
    cursor:pointer;
    text-transform:uppercase;
  }

  footer{
    margin-top:36px;
    font-family:'Space Mono', monospace;
    font-size:10px;
    color:var(--dim);
    text-align:center;
    letter-spacing:0.5px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>WAYPOINT</h1>
    <p>a lesson a day, for the in-between moments</p>
  </header>

  <div class="error-banner" id="errorBanner"></div>

  <div id="homeView">
    <div class="board" id="boardEl"></div>
    <div class="add-route">
      <input id="newTopicInput" type="text" placeholder="Start a new topic — e.g. process engineering">
      <button id="addTopicBtn">Add</button>
    </div>
  </div>

  <div id="lessonView" style="display:none;">
    <button class="back-link" id="backBtn">← all routes</button>
    <div id="passEl"></div>
  </div>

  <footer>no sign-up · everything stays on this device</footer>
</div>

<script>
// ====== CONFIG — fill this in after you deploy the Cloudflare Worker ======
const WORKER_URL = "PASTE_YOUR_WORKER_URL_HERE";
// ============================================================================

const STORAGE_KEY = 'waypoint_topics_v1';
let topics = {}; // { topicName: { day, streak, lastCompletedDate, historySummaries: [], today: {...}|null } }
let currentTopic = null;

function todayStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function loadTopics(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    topics = raw ? JSON.parse(raw) : {};
  } catch(e) { topics = {}; }
}
function saveTopics(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(topics)); } catch(e) { /* not fatal */ }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showError(msg, retryFn){
  const banner = document.getElementById('errorBanner');
  banner.innerHTML = '';
  banner.appendChild(document.createTextNode(msg));
  if (retryFn) {
    const btn = document.createElement('button');
    btn.textContent = 'Retry';
    btn.onclick = () => { banner.style.display = 'none'; retryFn(); };
    banner.appendChild(btn);
  }
  banner.style.display = 'flex';
}
function clearError(){ document.getElementById('errorBanner').style.display = 'none'; }

// ---------- Home / board view ----------
function renderHome(){
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('lessonView').style.display = 'none';
  const boardEl = document.getElementById('boardEl');
  const names = Object.keys(topics);

  if (names.length === 0) {
    boardEl.innerHTML = `<div class="empty-board">No routes yet. Add a topic below — process engineering, data science, whatever you're curious about — and get your first lesson today.</div>`;
    return;
  }

  boardEl.innerHTML = '';
  names.forEach(name => {
    const t = topics[name];
    const doneToday = t.today && t.today.completed && t.today.date === todayStr();
    const generatedToday = t.today && t.today.date === todayStr();

    let statusLabel, statusClass;
    if (doneToday) { statusLabel = 'ARRIVED'; statusClass = 'status-arrived'; }
    else if (generatedToday) { statusLabel = 'IN TRANSIT'; statusClass = 'status-transit'; }
    else { statusLabel = 'BOARDING'; statusClass = 'status-boarding'; }

    const row = document.createElement('div');
    row.className = 'board-row';
    row.innerHTML = `
      <div class="row-left">
        <div class="row-topic">${escapeHtml(name)}</div>
        <div class="row-meta">DAY ${String(t.day).padStart(2,'0')} · STREAK ${t.streak} 🔥</div>
      </div>
      <div class="row-status ${statusClass}">${statusLabel}</div>
    `;
    row.onclick = () => openTopic(name);
    boardEl.appendChild(row);
  });
}

document.getElementById('addTopicBtn').onclick = addTopic;
document.getElementById('newTopicInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addTopic(); });

function addTopic(){
  const input = document.getElementById('newTopicInput');
  const name = input.value.trim();
  if (!name) return;
  if (topics[name]) { openTopic(name); input.value = ''; return; }
  topics[name] = { day: 1, streak: 0, lastCompletedDate: null, historySummaries: [], today: null };
  saveTopics();
  input.value = '';
  renderHome();
  openTopic(name);
}

document.getElementById('backBtn').onclick = () => { currentTopic = null; renderHome(); };

// ---------- Lesson / boarding pass view ----------
function openTopic(name){
  currentTopic = name;
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('lessonView').style.display = 'block';
  clearError();
  renderPass();
}

function renderPass(){
  const t = topics[currentTopic];
  const passEl = document.getElementById('passEl');
  const hasToday = t.today && t.today.date === todayStr();

  if (!hasToday) {
    passEl.innerHTML = `
      <div class="pass">
        <div class="pass-top">
          <div class="pass-day">DAY<b>${String(t.day).padStart(2,'0')}</b></div>
          <div class="pass-streak">STREAK<b>${t.streak} 🔥</b></div>
        </div>
        <div class="pass-destination">${escapeHtml(currentTopic)}</div>
        <div class="lesson-section">
          <div class="lesson-body">Today's lesson hasn't boarded yet. Generate it whenever you're ready — takes a few seconds.</div>
          <div class="cta-row">
            <button class="generate-btn" id="generateBtn">Generate today's lesson</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('generateBtn').onclick = generateToday;
    return;
  }

  const lesson = t.today;
  const completed = lesson.completed;

  let quizHtml = '';
  lesson.quiz.forEach((q, qi) => {
    const answered = lesson.answers && lesson.answers[qi] !== undefined;
    let optsHtml = '';
    q.options.forEach((opt, oi) => {
      let cls = 'quiz-option';
      if (answered) {
        if (oi === q.correct_index) cls += ' correct';
        else if (oi === lesson.answers[qi]) cls += ' incorrect';
      }
      optsHtml += `<button class="${cls}" data-qi="${qi}" data-oi="${oi}" ${answered ? 'disabled' : ''}>${escapeHtml(opt)}</button>`;
    });
    quizHtml += `
      <div class="quiz-q">
        <div class="quiz-q-text">${qi+1}. ${escapeHtml(q.question)}</div>
        <div class="quiz-options">${optsHtml}</div>
        ${answered ? `<div class="quiz-explain">${escapeHtml(q.explanation)}</div>` : ''}
      </div>
    `;
  });

  const answeredCount = lesson.answers ? Object.keys(lesson.answers).length : 0;
  const correctCount = lesson.answers ? Object.keys(lesson.answers).filter(qi => lesson.answers[qi] === lesson.quiz[qi].correct_index).length : 0;

  passEl.innerHTML = `
    <div class="pass">
      ${completed ? `<div class="stamp-overlay">Arrived</div>` : ''}
      <div class="pass-top">
        <div class="pass-day">DAY<b>${String(t.day).padStart(2,'0')}</b></div>
        <div class="pass-streak">STREAK<b>${t.streak} 🔥</b></div>
      </div>
      <div class="pass-destination">${escapeHtml(currentTopic)}</div>
      <div class="lesson-section">
        <div class="lesson-title">${escapeHtml(lesson.lesson_title)}</div>
        <div class="lesson-body">${escapeHtml(lesson.lesson_body)}</div>
      </div>
      <div class="perforation"></div>
      <div class="quiz-section">
        <div class="quiz-label">Quick check — ${answeredCount}/4 answered</div>
        ${quizHtml}
        ${completed ? `
          <div class="result-bar">
            <div class="result-score">${correctCount}/4</div>
            <div class="result-note">Today's lesson is stamped. Come back tomorrow for day ${t.day + 1}.</div>
          </div>
        ` : ''}
      </div>
    </div>
  `;

  if (!completed) {
    passEl.querySelectorAll('.quiz-option').forEach(btn => {
      btn.onclick = () => answerQuestion(parseInt(btn.dataset.qi,10), parseInt(btn.dataset.oi,10));
    });
  }
}

function answerQuestion(qi, oi){
  const t = topics[currentTopic];
  const lesson = t.today;
  if (!lesson.answers) lesson.answers = {};
  if (lesson.answers[qi] !== undefined) return;
  lesson.answers[qi] = oi;

  const allAnswered = lesson.quiz.every((_, i) => lesson.answers[i] !== undefined);
  if (allAnswered) {
    lesson.completed = true;
    const today = todayStr();
    if (t.lastCompletedDate !== today) {
      // simple streak logic: if the last completed day was yesterday, extend; otherwise reset to 1
      const y = new Date();
      y.setDate(y.getDate() - 1);
      const yesterday = `${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,'0')}-${String(y.getDate()).padStart(2,'0')}`;
      t.streak = (t.lastCompletedDate === yesterday) ? t.streak + 1 : 1;
      t.lastCompletedDate = today;
    }
  }
  saveTopics();
  renderPass();
}

async function generateToday(){
  const t = topics[currentTopic];
  const btn = document.getElementById('generateBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }
  clearError();

  if (!WORKER_URL || WORKER_URL === "PASTE_YOUR_WORKER_URL_HERE") {
    showError('The Worker URL is not set yet — open the file and paste your deployed Worker URL into WORKER_URL near the top of the script.');
    if (btn) { btn.disabled = false; btn.textContent = 'Generate today\'s lesson'; }
    return;
  }

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        topic: currentTopic,
        day: t.day,
        priorSummaries: t.historySummaries.slice(-8) // keep prompt small — last 8 days of context is plenty
      })
    });
    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      throw new Error('HTTP ' + res.status + (errText ? ': ' + errText.slice(0,150) : ''));
    }
    const data = await res.json();
    if (!data.lesson_body || !Array.isArray(data.quiz)) {
      throw new Error('Got an unexpected response shape back.');
    }
    t.today = {
      date: todayStr(),
      lesson_title: data.lesson_title,
      lesson_body: data.lesson_body,
      quiz: data.quiz,
      day_summary: data.day_summary,
      answers: {},
      completed: false
    };
    t.historySummaries.push(data.day_summary || data.lesson_title || '');
    saveTopics();
    renderPass();
  } catch(err) {
    const isRateLimit = err.message && err.message.includes('429');
    const msg = isRateLimit
      ? "Hit the free plan's rate limit — wait about a minute, then tap Retry."
      : "Couldn't generate today's lesson — " + err.message;
    showError(msg, generateToday);
    if (btn) { btn.disabled = false; btn.textContent = 'Generate today\'s lesson'; }
  }
}

// When opening a topic on a new day after a completed lesson, bump the day counter for next time
function rolloverIfNeeded(){
  const today = todayStr();
  Object.values(topics).forEach(t => {
    if (t.today && t.today.date !== today && t.today.completed) {
      t.day = t.day + 1;
      t.today = null;
    }
  });
  saveTopics();
}

loadTopics();
rolloverIfNeeded();
renderHome();
</script>
</body>
</html>
